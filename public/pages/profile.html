<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><title>Профиль — КУРСОР</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/uploads/mascot/happy.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fira+Code&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
  .profile-avatar { position:relative; width:140px; height:140px; flex-shrink:0; cursor:pointer; }
  .profile-avatar img, .profile-avatar .pa-fallback {
    width:100%; height:100%; border-radius:50%; object-fit:cover;
    background:rgba(255,255,255,0.25); color:white;
    display:flex; align-items:center; justify-content:center;
    font-size:64px; font-weight:800;
    border:4px solid rgba(255,255,255,0.4); box-shadow:0 8px 24px rgba(0,0,0,0.15);
  }
  .profile-avatar .pa-hover {
    position:absolute; inset:0; border-radius:50%;
    background:rgba(0,0,0,0.5); color:white;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-size:13px; font-weight:700; opacity:0; transition:opacity 0.2s; text-align:center;
  }
  .profile-avatar:hover .pa-hover { opacity:1; }
  .av-preview {
    width:160px; height:160px; margin:16px auto;
    border-radius:50%; overflow:hidden;
    background:#f1f5f9; display:flex; align-items:center; justify-content:center;
    border:3px dashed #cbd5e1; color:#94a3b8; font-size:13px; text-align:center;
    flex-shrink:0;
  }
  .av-preview img { width:100%; height:100%; object-fit:cover; }
  .av-drop {
    border:2px dashed #cbd5e1; background:#f8fafc; border-radius:12px;
    padding:18px; text-align:center; color:#64748b; cursor:pointer; transition:all 0.2s;
    display:block;
  }
  .av-drop.dragover { border-color:#6366f1; background:#eef2ff; color:#4f46e5; }
  .av-drop input { display:none; }
  /* Фикс: overlay блокирует скролл страницы и не даёт вылезать фоновым элементам */
  body.modal-open { overflow:hidden; }
</style>
</head>
<body>
<div id="nav"></div>
<div class="container"><div id="content">Загружаем…</div></div>
<script src="/data/database.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
const user = requireAuth(['student','teacher','admin']);
if (user) init();

async function init() {
  document.getElementById('nav').innerHTML = renderNavbar('profile');
  I18N.applyI18n();
  try {
    try { const fresh = await API._request('GET','/api/auth/me'); Object.assign(user, fresh.user || {}); localStorage.setItem('kursor_user_cache', JSON.stringify(user)); } catch {}
    if (user.role === 'student') {
      const [tasks, modules, progress] = await Promise.all([
        API.getTasks(), API.getModules(), API.getMyProgress(),
      ]);
      render(tasks, modules, progress);
    } else {
      renderStaff();
    }
  } catch (err) {
    document.getElementById('content').innerHTML =
      `<div class="card" style="padding:30px;text-align:center;color:#ef4444">Ошибка: ${escapeHtml(err.message)}</div>`;
  }
}

function avatarBlock() {
  const initial = (user.name || 'У').charAt(0).toUpperCase();
  const body = user.avatar_url
    ? `<img src="${escapeHtml(user.avatar_url)}" alt="Аватар">`
    : `<div class="pa-fallback">${initial}</div>`;
  return `<div class="profile-avatar" onclick="openAvatarModal()" title="Сменить аватарку">
    ${body}
    <div class="pa-hover"><img src="https://cdn-icons-png.flaticon.com/512/685/685655.png" style="width:28px;height:28px;filter:invert(1);margin-bottom:4px"><div>Сменить</div></div>
  </div>`;
}

function renderStaff() {
  const roleLabel = user.role === 'admin' ? 'Администратор' : 'Учитель';
  document.getElementById('content').innerHTML = `
    <div class="welcome-banner">
      ${avatarBlock()}
      <div style="flex:1">
        <h1>${escapeHtml(user.name)}</h1>
        <p style="opacity:0.95">${roleLabel} · Логин: <code style="background:rgba(255,255,255,0.2);padding:2px 6px;border-radius:4px">${escapeHtml(user.login)}</code></p>
        <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-outline" style="background:rgba(255,255,255,0.2);color:white;border-color:white" onclick="openAvatarModal()">Сменить аватарку</button>
          <button class="btn btn-outline" style="background:rgba(255,255,255,0.2);color:white;border-color:white" onclick="openChangePassword()">Сменить пароль</button>
        </div>
      </div>
    </div>`;
}

function render(tasks, modules, progress) {
  const grp = KURSOR_DB.GROUPS[user.group];

  const recent = Object.entries(progress.tasks)
    .filter(([id, p]) => p.status === 'done')
    .sort((a, b) => (b[1].completedAt || 0) - (a[1].completedAt || 0))
    .slice(0, 10)
    .map(([id, p]) => {
      const t = tasks.find(t => t.id === parseInt(id));
      return t ? { task: t, ...p } : null;
    }).filter(Boolean);

  document.getElementById('content').innerHTML = `
    <div class="welcome-banner">
      ${avatarBlock()}
      <div style="flex:1">
        <h1>${escapeHtml(user.name)}</h1>
        <p style="opacity:0.95">${grp ? grp.name : 'Ученик'} · Возраст: ${user.age || '—'} лет</p>
        <div style="display:flex;gap:20px;margin-top:14px;flex-wrap:wrap">
          <div><b style="font-size:24px"><img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png" style="width:20px;height:20px;vertical-align:-3px"> ${progress.points}</b><div style="font-size:13px;opacity:0.9">Очков</div></div>
          <div><b style="font-size:24px"><img src="https://cdn-icons-png.flaticon.com/512/785/785116.png" style="width:20px;height:20px;vertical-align:-3px"> ${progress.streak}</b><div style="font-size:13px;opacity:0.9">Дней подряд</div></div>
          <div><b style="font-size:24px"><img src="https://cdn-icons-png.flaticon.com/512/190/190411.png" style="width:20px;height:20px;vertical-align:-3px"> ${Object.values(progress.tasks).filter(t=>t.status==='done').length}</b><div style="font-size:13px;opacity:0.9">Задач</div></div>
        </div>
        <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-outline" style="background:rgba(255,255,255,0.2);color:white;border-color:white" onclick="openAvatarModal()">Сменить аватарку</button>
          <button class="btn btn-outline" style="background:rgba(255,255,255,0.2);color:white;border-color:white" onclick="openChangePassword()">Сменить пароль</button>
        </div>
      </div>
    </div>

    <h2 class="section-title">Значки</h2>
    <div class="badges-grid" style="margin-bottom:32px">
      ${KURSOR_DB.BADGES.map(b => `
        <div class="badge-card ${progress.badges.includes(b.id) ? 'earned' : 'locked'}">
          <div class="badge-emoji"><img class="ic ic-48" src="${b.icon || b.emoji}" alt=""></div>
          <div class="badge-name">${b.name}</div>
          <div style="font-size:11px;color:#64748b;margin-top:4px">${b.desc}</div>
        </div>`).join('')}
    </div>

    <h2 class="section-title">Последние решённые задачи</h2>
    ${recent.length ? `
      <div class="card">
        ${recent.map(r => {
          const m = modules.find(m => m.id === r.task.module);
          const lang = m ? KURSOR_DB.LANGS[m.lang] : null;
          return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #e2e8f0">
            ${lang ? `<span class="lang-badge ${lang.class}"><img src="${lang.icon}" style="width:14px;height:14px;object-fit:contain;vertical-align:-2px"></span>` : ''}
            <div style="flex:1">
              <b>${escapeHtml(r.task.title)}</b>
              <div style="font-size:12px;color:#64748b">${new Date(r.completedAt).toLocaleDateString('ru-RU')} · +${r.points} очков</div>
            </div>
            <a href="/pages/task.html?id=${r.task.id}" class="btn btn-ghost">→</a>
          </div>`;
        }).join('')}
      </div>` : '<div class="card" style="text-align:center;padding:30px;color:#64748b">Пока нет решённых задач</div>'}

    <h2 class="section-title" style="margin-top:32px" data-i18n="fb.title">Обратная связь</h2>
    <div id="fbFeed" class="card" style="padding:16px;text-align:center;color:#64748b">${I18N ? I18N.t('common.loading') : '...'}</div>
  `;
  if (window.I18N) I18N.applyI18n(document.getElementById('content'));
  loadProfileFeedback();
}

async function loadProfileFeedback() {
  const box = document.getElementById('fbFeed');
  if (!box) return;
  try {
    const list = await API.getFeedback();
    if (!list.length) { box.innerHTML = `<span style="color:#64748b">${I18N.t('fb.empty')}</span>`; return; }
    box.style.textAlign = 'left';
    box.innerHTML = list.map(f => `<div style="border-bottom:1px solid #eef2f7;padding:10px 0">
      <div style="font-size:12px;color:#64748b">${escapeHtml(f.teacherName||'')} · ${new Date(f.createdAt).toLocaleDateString('ru-RU')}</div>
      <div>${escapeHtml(f.text)}</div></div>`).join('');
  } catch (e) {
    box.innerHTML = `<span style="color:#94a3b8">${escapeHtml(e.message)}</span>`;
  }
}

/* ===== АВАТАРКА ===== */
const MAX_AVATAR_BYTES = 2 * 1024 * 1024;

function openAvatarModal() {
  // Блокируем скролл страницы
  document.body.classList.add('modal-open');

  const modal = document.createElement('div');
  modal.className = 'modal-overlay active';
  // Гарантируем что overlay перекрывает всё
  modal.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;padding:20px;';
  modal.innerHTML = `
    <div class="modal" style="max-width:420px;width:100%;position:relative;">
      <h2>Сменить аватарку</h2>
      <p style="color:#64748b;font-size:13px;margin-top:4px">JPG или PNG, до 2 МБ. Ничего не загружается, пока ты не нажмёшь «Сохранить».</p>
      <div class="av-preview" id="avPrev">
        ${user.avatar_url ? `<img src="${escapeHtml(user.avatar_url)}" alt="">` : '<span style="padding:10px">Превью появится здесь</span>'}
      </div>
      <label class="av-drop" id="avDrop">
        <input type="file" id="avFile" accept="image/png,image/jpeg">
        <img src="https://cdn-icons-png.flaticon.com/512/126/126477.png" style="width:38px;height:38px;opacity:0.7;display:block;margin:0 auto 6px">
        <div><b>Выбери файл</b> или перетащи сюда</div>
        <div style="font-size:12px;color:#94a3b8;margin-top:4px">JPG/PNG · до 2 МБ</div>
      </label>
      <div id="avMsg" style="font-weight:700;margin:10px 0;min-height:20px;text-align:center"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:4px">
        <button class="btn btn-ghost" id="avDelBtn" style="color:#ef4444;display:inline-flex;align-items:center;gap:6px;${user.avatar_url ? '' : 'visibility:hidden'}">
          <img src="https://cdn-icons-png.flaticon.com/512/3221/3221897.png" style="width:16px;height:16px"> Удалить
        </button>
        <div style="display:flex;gap:10px">
          <button class="btn btn-outline" id="avCancel">Отмена</button>
          <button class="btn btn-success" id="avSave" disabled>Сохранить</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(modal);

  function closeModal() {
    modal.remove();
    document.body.classList.remove('modal-open');
  }

  const fileInput = modal.querySelector('#avFile');
  const drop = modal.querySelector('#avDrop');
  const prev = modal.querySelector('#avPrev');
  const msg = modal.querySelector('#avMsg');
  const saveBtn = modal.querySelector('#avSave');
  const delBtn = modal.querySelector('#avDelBtn');
  let pendingDataUrl = null;

  function showErr(t) { msg.style.color = '#ef4444'; msg.textContent = t; }
  function showOk(t)  { msg.style.color = '#10b981'; msg.textContent = t; }

  function handle(file) {
    msg.textContent = ''; pendingDataUrl = null; saveBtn.disabled = true;
    if (!file) return;
    if (!/^image\/(png|jpe?g)$/.test(file.type)) return showErr('Только JPG или PNG');
    if (file.size > MAX_AVATAR_BYTES) return showErr(`Файл ${(file.size/1024/1024).toFixed(2)} МБ — макс 2 МБ`);
    const r = new FileReader();
    r.onload = () => {
      pendingDataUrl = r.result;
      prev.innerHTML = `<img src="${pendingDataUrl}" alt="Превью">`;
      saveBtn.disabled = false;
      showOk(`${file.name} (${(file.size/1024).toFixed(0)} КБ)`);
    };
    r.onerror = () => showErr('Не удалось прочитать');
    r.readAsDataURL(file);
  }

  fileInput.onchange = e => handle(e.target.files[0]);
  ['dragenter','dragover'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('dragover'); }));
  ['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('dragover'); }));
  drop.addEventListener('drop', e => { const f = e.dataTransfer.files && e.dataTransfer.files[0]; if (f) handle(f); });

  modal.querySelector('#avCancel').onclick = closeModal;
  modal.onclick = e => { if (e.target === modal) closeModal(); };

  saveBtn.onclick = async () => {
    if (!pendingDataUrl) return;
    saveBtn.disabled = true; saveBtn.textContent = 'Загружаем...';
    try {
      const r = await API.uploadAvatar(user.id, pendingDataUrl);
      user.avatar_url = r.avatar_url;
      closeModal();
      showToast('Аватарка обновлена', 'success');
      document.getElementById('nav').innerHTML = renderNavbar('profile');
      init();
    } catch (e) { showErr(e.message); saveBtn.disabled = false; saveBtn.textContent = 'Сохранить'; }
  };

  delBtn.onclick = async () => {
    if (!confirm('Удалить аватарку?')) return;
    delBtn.disabled = true;
    try {
      await API.deleteAvatar(user.id);
      user.avatar_url = null;
      closeModal();
      showToast('Аватарка удалена', 'success');
      document.getElementById('nav').innerHTML = renderNavbar('profile');
      init();
    } catch (e) { showErr(e.message); delBtn.disabled = false; }
  };
}

function openChangePassword() {
  document.body.classList.add('modal-open');
  const modal = document.createElement('div');
  modal.className = 'modal-overlay active';
  modal.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;padding:20px;';
  modal.innerHTML = `
    <div class="modal" style="max-width:420px;width:100%">
      <h2>Сменить пароль</h2>
      <div class="form-group"><label>Старый пароль</label><input class="form-input" type="password" id="oldp"></div>
      <div class="form-group"><label>Новый пароль (мин. 4 символа)</label><input class="form-input" type="password" id="newp"></div>
      <div id="cpMsg" style="color:#ef4444;font-weight:700;margin:8px 0;min-height:18px"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-outline" id="cpCancel">Отмена</button>
        <button class="btn btn-success" id="cpBtn">Сохранить</button>
      </div>
    </div>`;
  document.body.appendChild(modal);

  function closeModal() { modal.remove(); document.body.classList.remove('modal-open'); }
  modal.querySelector('#cpCancel').onclick = closeModal;
  modal.onclick = e => { if (e.target === modal) closeModal(); };

  modal.querySelector('#cpBtn').onclick = async () => {
    const oldP = modal.querySelector('#oldp').value;
    const newP = modal.querySelector('#newp').value;
    const msgEl = modal.querySelector('#cpMsg');
    msgEl.textContent = '';
    try {
      await API._request('POST', '/api/auth/change-password', { oldPassword: oldP, newPassword: newP });
      closeModal();
      showToast('Пароль изменён', 'success');
    } catch (e) { msgEl.textContent = e.message; }
  };
}
</script>
</body>
</html>
