<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><title>Админ — КУРСОР</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/uploads/mascot/happy.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fira+Code&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="logo">
      <img src="https://salamalekum.sirv.com/_1_1.png.webp" alt="KURSOR">
    </div>
    <div id="navLangSlot" style="padding:0 16px 12px"></div>
    <div class="nav-search">
      <input id="navSearch" placeholder="Поиск раздела…" data-i18n-ph="admin.search_nav" oninput="filterNav(this.value)">
    </div>
    <nav id="navTree"></nav>
    <a href="#" onclick="logout();return false;" style="margin-top:18px;display:flex;align-items:center;gap:10px;color:#fca5a5">
      <img class="ic ic-20" src="https://cdn-icons-png.flaticon.com/512/1828/1828479.png" alt=""><span data-i18n="nav.logout">Выйти</span>
    </a>
  </aside>
  <main class="admin-main">
    <div id="tab">Загружаем…</div>
  </main>
</div>

<div id="modal" class="modal-overlay"><div class="modal" id="modalContent"></div></div>

<script src="/data/database.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script>
const user = requireAuth(['admin','teacher','assistant']);
let userPerms = {};
const isAdmin = user && user.role === 'admin';
let currentTab = 'dashboard';
let cache = { users: [], modules: [], tasks: [], progressById: {} };
let _renderToken = 0;

/* ---- Сгруппированное меню ---- */
/* SVG-иконки — единый стиль (Heroicons outline, 20×20) */
const NAV_ICONS = {
  dashboard:     `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="7" height="7" rx="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5"/></svg>`,
  notifications: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2a6 6 0 0 1 6 6c0 3.5 1.5 5 1.5 5h-15S4 11.5 4 8a6 6 0 0 1 6-6z"/><path d="M8.27 17a2 2 0 0 0 3.46 0"/></svg>`,
  modules:       `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h5v5H4zM11 4h5v5h-5zM4 11h5v5H4zM11 11h5v5h-5z"/></svg>`,
  tasks:         `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M7 9l2 2 4-4"/><rect x="3" y="3" width="14" height="14" rx="2"/></svg>`,
  materials:     `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4a2 2 0 0 1 2-2h5l5 5v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4z"/><polyline points="11 2 11 7 16 7"/></svg>`,
  access:        `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="9" width="14" height="9" rx="2"/><path d="M7 9V6a3 3 0 0 1 6 0v3"/></svg>`,
  branches:      `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="4" r="2"/><circle cx="4" cy="16" r="2"/><circle cx="16" cy="16" r="2"/><path d="M10 6v3M10 9l-4 5M10 9l4 5"/></svg>`,
  tariffs:       `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="16" height="11" rx="2"/><path d="M2 9h16"/><path d="M6 13h.01M9 13h3"/></svg>`,
  clients:       `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="7" r="3"/><path d="M2 17c0-3.3 2.7-6 6-6s6 2.7 6 6"/><path d="M14 6a3 3 0 0 1 0 6M18 17c0-2.2-1.3-4.1-3.2-5"/></svg>`,
  groups:        `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="7" r="2.5"/><path d="M5.5 17c0-2.5 2-4.5 4.5-4.5s4.5 2 4.5 4.5"/><circle cx="3.5" cy="8" r="1.8"/><path d="M1 16c0-1.9 1.1-3.2 2.5-3.2"/><circle cx="16.5" cy="8" r="1.8"/><path d="M19 16c0-1.9-1.1-3.2-2.5-3.2"/></svg>`,
  sessions:      `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="14" height="13" rx="2"/><path d="M3 8h14M7 2v2M13 2v2M7 12h2M11 12h2M7 15h2"/></svg>`,
  homework:      `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4a2 2 0 0 1 2-2h5l5 5v9a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4z"/><path d="M7 11h6M7 14h4"/></svg>`,
  users:         `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="6" r="3"/><path d="M3 18c0-3.9 3.1-7 7-7s7 3.1 7 7"/></svg>`,
  permissions:   `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2l7 3v5c0 4-3 7-7 8C3 17 0 14 0 10V5l7-3z" transform="translate(1,1) scale(0.9)"/><path d="M7 10l2 2 4-4"/></svg>`,
};
function navIcon(key) {
  const svg = NAV_ICONS[key] || NAV_ICONS.tasks;
  return `<span class="nav-svg-icon">${svg}</span>`;
}

const NAV_GROUPS = [
  { id:'overview', titleKey:'admin.grp_overview', items:[
    { tab:'dashboard', i18n:'admin.dashboard', iconKey:'dashboard' },
    { tab:'notifications', i18n:'admin.notifications', iconKey:'notifications' },
  ]},
  { id:'education', titleKey:'admin.grp_education', items:[
    { tab:'modules', i18n:'admin.modules', iconKey:'modules' },
    { tab:'tasks', i18n:'admin.tasks', iconKey:'tasks' },
    { tab:'materials', i18n:'admin.materials', iconKey:'materials' },
    { tab:'access', i18n:'admin.access', iconKey:'access', adminOnly:true },
  ]},
  { id:'crm', titleKey:'admin.grp_crm', adminOnly:true, items:[
    { tab:'branches', i18n:'admin.branches', iconKey:'branches', adminOnly:true },
    { tab:'tariffs', i18n:'admin.tariffs', iconKey:'tariffs', adminOnly:true },
    { tab:'clients', i18n:'admin.clients', iconKey:'clients', adminOnly:true },
  ]},
  { id:'journal', titleKey:'admin.grp_journal', items:[
    { tab:'groups', i18n:'admin.groups', iconKey:'groups' },
    { tab:'sessions', i18n:'admin.sessions', iconKey:'sessions' },
    { tab:'homework', i18n:'admin.homework', iconKey:'homework' },
  ]},
  { id:'people', titleKey:'admin.grp_people', adminOnly:true, items:[
    { tab:'users', i18n:'admin.users', iconKey:'users', adminOnly:true },
    { tab:'permissions', i18n:'admin.permissions', iconKey:'permissions', adminOnly:true },
  ]},
];

function buildNav() {
  const tree = document.getElementById('navTree');
  const collapsed = JSON.parse(localStorage.getItem('kursor_nav_collapsed') || '{}');
  tree.innerHTML = NAV_GROUPS.map(g => {
    if (g.adminOnly && !isAdmin) return '';
    const items = g.items.filter(it => !(it.adminOnly && !isAdmin));
    if (!items.length) return '';
    const isCol = collapsed[g.id] ? 'collapsed' : '';
    return `<div class="nav-group ${isCol}" data-group="${g.id}">
      <div class="nav-group-title" onclick="toggleNavGroup('${g.id}')">
        <span>${I18N.t(g.titleKey)}</span><span class="chev">▼</span>
      </div>
      <div class="nav-group-items">
        ${items.map(it => `<a href="#" data-tab="${it.tab}" data-label="${I18N.t(it.i18n).toLowerCase()}" onclick="switchTab('${it.tab}');return false;">
          ${navIcon(it.iconKey)}<span>${I18N.t(it.i18n)}</span></a>`).join('')}
      </div>
    </div>`;
  }).join('');
  highlightActiveNav();
}
function toggleNavGroup(id) {
  const collapsed = JSON.parse(localStorage.getItem('kursor_nav_collapsed') || '{}');
  collapsed[id] = !collapsed[id];
  localStorage.setItem('kursor_nav_collapsed', JSON.stringify(collapsed));
  const el = document.querySelector(`.nav-group[data-group="${id}"]`);
  if (el) el.classList.toggle('collapsed');
}
function highlightActiveNav() {
  document.querySelectorAll('#navTree a').forEach(a => {
    a.classList.toggle('active', a.dataset.tab === currentTab);
  });
}
function filterNav(q) {
  q = (q || '').toLowerCase().trim();
  document.querySelectorAll('#navTree a').forEach(a => {
    a.classList.toggle('nav-hidden', q && !a.dataset.label.includes(q));
  });
  document.querySelectorAll('.nav-group').forEach(g => {
    const anyVisible = g.querySelectorAll('a:not(.nav-hidden)').length > 0;
    g.classList.toggle('nav-hidden', q && !anyVisible);
    if (q) g.classList.remove('collapsed');
  });
}

function _withTimeout(promise, ms, label) {
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error('Тайм-аут запроса: ' + label)), ms))
  ]);
}

// Базовые данные нужны только для части вкладок — грузим по требованию
let _baseLoaded = false;
async function loadBase(force) {
  if (_baseLoaded && !force) return;
  const [users, modules, tasks] = await _withTimeout(Promise.all([
    API.getUsers(true), API.getModules(true), API.getTasks(true),
  ]), 15000, 'users/modules/tasks');
  cache.users = users || [];
  cache.modules = modules || [];
  cache.tasks = tasks || [];
  try {
    const allProgress = await _withTimeout(API.getAllProgress(), 15000, 'progress');
    cache.progressById = Object.fromEntries((allProgress || []).map(p => [p.userId, p]));
  } catch (e) { console.warn('progress load failed:', e.message); cache.progressById = {}; }
  _baseLoaded = true;
}

// Какие вкладки требуют базовый кэш (users/modules/tasks/progress)
const BASE_TABS = ['dashboard','users','modules','tasks','materials','access','permissions','groups','sessions','homework','clients'];

const TAB_RENDERERS = {
  dashboard: () => renderDashboard(),
  users: () => renderUsers(),
  modules: () => renderModules(),
  tasks: () => renderTasks(),
  materials: () => renderMaterials(),
  access: () => renderAccess(),
  branches: () => renderBranches(),
  tariffs: () => renderTariffs(),
  groups: () => renderGroups(),
  clients: () => renderClients(),
  permissions: () => renderPermissions(),
  sessions: () => renderSessions(),
  homework: () => renderHomeworkAdmin(),
  notifications: () => renderNotificationsTab(),
};

async function render() {
  const myToken = ++_renderToken;
  document.getElementById('tab').innerHTML = `<div class="card" style="padding:30px">${I18N.t('common.loading')}</div>`;
  try {
    if (BASE_TABS.includes(currentTab)) await loadBase();
  } catch (e) {
    if (myToken !== _renderToken) return;
    document.getElementById('tab').innerHTML = `<div class="card" style="padding:30px;color:#ef4444">${I18N.t('common.error')}: ${escapeHtml(e.message)}<br><br><button class="btn" onclick="render()">${I18N.t('common.back')}</button></div>`;
    return;
  }
  if (myToken !== _renderToken) return;
  try {
    const fn = TAB_RENDERERS[currentTab] || TAB_RENDERERS.dashboard;
    await fn();
  } catch (e) {
    document.getElementById('tab').innerHTML = `<div class="card" style="padding:30px;color:#ef4444">${I18N.t('common.error')} "${currentTab}": ${escapeHtml(e.message)}</div>`;
    console.error(e);
  }
}

function switchTab(t) {
  currentTab = t;
  highlightActiveNav();
  document.getElementById('navSearch').value = '';
  filterNav('');
  render();
}

// Инициализация после загрузки
window.addEventListener('DOMContentLoaded', async () => {
  document.getElementById('navLangSlot').innerHTML = I18N.switcherHtml();
  try { const fresh = await API.refreshCurrentUser(); userPerms = fresh.permissions || {}; } catch {}
  buildNav();
  if (user) render();
});

function renderDashboard() {
  const students = cache.users.filter(u => u.role === 'student');
  const totalCompleted = students.reduce((sum, s) => {
    const p = cache.progressById[s.id];
    return sum + (p ? Object.values(p.tasks).filter(t=>t.status==='done').length : 0);
  }, 0);
  const totalPoints = students.reduce((sum, s) => sum + (cache.progressById[s.id]?.points || 0), 0);

  document.getElementById('tab').innerHTML = `
    <h1>Обзор платформы</h1>
    <p style="color:#64748b;margin-top:6px">Привет, <b>${escapeHtml(user.name)}</b>! Роль: <span class="badge badge-${user.role==='admin'?'danger':'warning'}">${user.role}</span></p>
    <div class="stats-grid" style="margin-top:20px">
      <div class="stat-card"><div class="stat-icon blue"><img src="https://cdn-icons-png.flaticon.com/512/1995/1995470.png" style="width:22px;height:22px"></div><div><div class="stat-value">${students.length}</div><div class="stat-label">Учеников</div></div></div>
      <div class="stat-card"><div class="stat-icon purple"><img src="https://cdn-icons-png.flaticon.com/512/2232/2232688.png" style="width:22px;height:22px"></div><div><div class="stat-value">${cache.modules.length}</div><div class="stat-label">Модулей</div></div></div>
      <div class="stat-card"><div class="stat-icon green"><img src="https://cdn-icons-png.flaticon.com/512/3143/3143190.png" style="width:22px;height:22px"></div><div><div class="stat-value">${cache.tasks.length}</div><div class="stat-label">Задач</div></div></div>
      <div class="stat-card"><div class="stat-icon orange"><img src="https://cdn-icons-png.flaticon.com/512/190/190411.png" style="width:22px;height:22px"></div><div><div class="stat-value">${totalCompleted}</div><div class="stat-label">Решено всеми</div></div></div>
      <div class="stat-card"><div class="stat-icon pink"><img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png" style="width:22px;height:22px"></div><div><div class="stat-value">${totalPoints}</div><div class="stat-label">Очков всего</div></div></div>
    </div>

    <h2 class="section-title" style="margin-top:30px">Быстрые действия</h2>
    <div style="display:flex;gap:14px;flex-wrap:wrap">
      ${user.role === 'admin' ? `<button class="btn btn-lg" onclick="switchTab('users');setTimeout(openUserForm,100)">Добавить аккаунт</button>` : ''}
      <button class="btn btn-lg btn-secondary" onclick="switchTab('tasks');setTimeout(openTaskForm,100)">Добавить задачу</button>
      <button class="btn btn-lg btn-success" onclick="switchTab('modules');setTimeout(openModuleForm,100)">Добавить модуль</button>
    </div>
  `;
}

function renderUsers() {
  if (user.role !== 'admin') {
    document.getElementById('tab').innerHTML = `
      <h1>Пользователи</h1>
      <div class="card" style="padding:24px;margin-top:14px">
        <p>Только администратор может создавать и редактировать аккаунты.</p>
      </div>`;
    return;
  }
  document.getElementById('tab').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h1 data-i18n="admin.users">Пользователи</h1>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="API.exportDownload('users','csv')"><img class="ic ic-16" src="https://cdn-icons-png.flaticon.com/512/2965/2965335.png" alt=""> <span data-i18n="common.export">Экспорт</span></button>
        <button class="btn btn-ghost btn-sm" onclick="openImport('users')"><img class="ic ic-16" src="https://cdn-icons-png.flaticon.com/512/2965/2965300.png" alt=""> <span data-i18n="common.import">Импорт</span></button>
        <button class="btn" onclick="openUserForm()">Создать аккаунт</button>
      </div>
    </div>
    <p style="color:#64748b;margin-bottom:14px">Пароли хранятся на сервере в виде bcrypt-хешей и не показываются.</p>
    <table class="table">
      <thead><tr><th>Имя</th><th>Логин</th><th>Роль</th><th>Возраст</th><th>Группа</th><th>Языки</th><th>Действия</th></tr></thead>
      <tbody>
        ${cache.users.map(u => `
          <tr>
            <td><b>${escapeHtml(u.name)}</b></td>
            <td><code>${escapeHtml(u.login)}</code></td>
            <td><span class="badge badge-${u.role==='admin'?'danger':u.role==='teacher'?'warning':'info'}">${u.role}</span></td>
            <td>${u.age || '—'}</td>
            <td>${KURSOR_DB.GROUPS[u.group]?.name || '—'}</td>
            <td>${(u.languages||[]).map(l=>KURSOR_DB.LANGS[l]?.icon ? `<img src="${KURSOR_DB.LANGS[l].icon}" style="width:18px;height:18px;object-fit:contain;vertical-align:-3px;margin-right:2px">` : '').join('') || '—'}</td>
            <td>
              <button class="btn btn-ghost" title="Редактировать" onclick="openUserForm('${u.id}')"><img src="https://cdn-icons-png.flaticon.com/512/1159/1159633.png" style="width:18px;height:18px;vertical-align:-3px"></button>
              ${u.id !== user.id ? `<button class="btn btn-ghost" title="Удалить" style="color:#ef4444" onclick="removeUser('${u.id}')"><img src="https://cdn-icons-png.flaticon.com/512/3221/3221897.png" style="width:18px;height:18px;vertical-align:-3px"></button>` : ''}
            </td>
          </tr>`).join('')}
      </tbody>
    </table>
  `;
}

function openUserForm(id) {
  const u = id ? cache.users.find(x => x.id === id) : { role:'student', age:10, group:2, languages:[] };
  const langs = Object.entries(KURSOR_DB.LANGS);
  document.getElementById('modalContent').innerHTML = `
    <h2>${id ? 'Редактировать' : 'Создать'} пользователя</h2>
    <div class="form-group"><label>Имя</label><input class="form-input" id="f_name" value="${escapeHtml(u.name||'')}" placeholder="Алия Серикова"></div>
    <div class="form-group"><label>Логин</label><input class="form-input" id="f_login" value="${escapeHtml(u.login||'')}" placeholder="aliya"></div>
    <div class="form-group">
      <label>Пароль ${id ? '<small style="color:#64748b">(оставь пустым, чтобы не менять)</small>' : ''}</label>
      <input class="form-input" id="f_password" type="text" value="" placeholder="${id ? 'не менять' : 'минимум 4 символа'}">
    </div>
    <div class="form-group"><label>Роль</label>
      <select class="form-input" id="f_role" onchange="toggleStudentFields()">
        <option value="student" ${u.role==='student'?'selected':''}>Ученик</option>
        <option value="teacher" ${u.role==='teacher'?'selected':''}>Учитель</option>
        <option value="assistant" ${u.role==='assistant'?'selected':''}>Ассистент</option>
        <option value="parent" ${u.role==='parent'?'selected':''}>Родитель</option>
        <option value="admin" ${u.role==='admin'?'selected':''}>Администратор</option>
      </select>
    </div>
    <div class="form-group" id="studentFields">
      <label>Возраст</label><input class="form-input" id="f_age" type="number" value="${u.age||10}" min="6" max="18">
      <label style="margin-top:10px">Группа</label>
      <select class="form-input" id="f_group">
        <option value="1" ${u.group==1?'selected':''}>Группа 1 (6–8 лет)</option>
        <option value="2" ${u.group==2?'selected':''}>Группа 2 (9–11 лет)</option>
        <option value="3" ${u.group==3?'selected':''}>Группа 3 (12–16 лет)</option>
      </select>
      <label style="margin-top:10px">Языки / технологии:</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">
        ${langs.map(([k,l]) => `
          <label class="filter-chip" style="cursor:pointer;display:flex;align-items:center;gap:6px">
            <input type="checkbox" class="f_lang" value="${k}" ${(u.languages||[]).includes(k)?'checked':''}>
            ${l.icon ? `<img src="${l.icon}" style="width:14px;height:14px;object-fit:contain;vertical-align:-2px">` : ''} ${l.name}
          </label>`).join('')}
      </div>
      <label style="margin-top:10px">Прикреплённый учитель (опционально)</label>
      <select class="form-input" id="f_teacher">
        <option value="">— не назначен —</option>
        ${cache.users.filter(x => x.role === 'teacher').map(t =>
          `<option value="${t.id}" ${u.teacher_id===t.id?'selected':''}>${escapeHtml(t.name)}</option>`).join('')}
      </select>
    </div>
    <div id="modalErr" style="color:#ef4444;font-weight:700;margin-top:8px;min-height:18px"></div>
    <div style="display:flex;gap:10px;margin-top:20px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="closeModal()">Отмена</button>
      <button class="btn btn-success" onclick="saveUser('${id||''}')">Сохранить</button>
    </div>
  `;
  document.getElementById('modal').classList.add('active');

  } else if (type === 'htmlcss') {
    const defHtml = `<!DOCTYPE html>
<html>
<head>
  <style>
    /* твои стили */
  </style>
</head>
<body>
  <h1>Привет!</h1>
</body>
</html>`;

async function saveTask(id) {
  const type = document.getElementById('t_type').value;
  const data = {
    type,
    module: document.getElementById('t_module').value,
    difficulty: parseInt(document.getElementById('t_diff').value) || 1,
    title: document.getElementById('t_title').value.trim(),
    description: document.getElementById('t_desc').value.trim(),
    explain: document.getElementById('t_explain').value.trim(),
  };
  const err = document.getElementById('modalErr');
  if (!data.title || !data.description) { err.textContent = 'Введи название и условие'; return; }
  if (type === 'quiz') {
    data.options = Array.from(document.querySelectorAll('.t_option')).map(i => i.value.trim());
    const r = document.querySelector('input[name=t_correct]:checked');
    if (!r) { err.textContent = 'Отметь правильный вариант'; return; }
    data.answer = parseInt(r.value);
  } else if (type === 'fill') {
    data.answer = document.getElementById('t_answer').value.trim();
    if (!data.answer) { err.textContent = 'Введи правильный ответ'; return; }
  } else if (type === 'order') {
    data.items = document.getElementById('t_items').value.split('\n').map(s=>s.trim()).filter(Boolean);
    if (data.items.length < 2) { err.textContent = 'Минимум 2 строки'; return; }
  } else if (type === 'code') {
    data.expectedOutput = document.getElementById('t_expected').value;
    data.starter = document.getElementById('t_starter').value;
  } else if (type === 'scratch') {
    data.scratchProjectId = document.getElementById('t_scratch_id').value.trim();
  } else if (type === 'htmlcss') {
    data.starter = document.getElementById('t_starter').value;
    data.expectedOutput = document.getElementById('t_expected').value;
  } else if (type === 'blockly') {
    data.expectedOutput = document.getElementById('t_expected').value;
  } else if (type === 'java' || type === 'cpp') {
    data.expectedOutput = document.getElementById('t_expected').value;
    data.starter = document.getElementById('t_starter').value;
    data.stdin = document.getElementById('t_stdin').value;
  }

  try {
    if (id && id !== 'null') await API.updateTask(id, data);
    else await API.createTask(data);
    closeModal(); await render(); showToast('<img src="https://cdn-icons-png.flaticon.com/512/190/190411.png" style="width:22px;height:22px"> Сохранено','success');
  } catch (e) { err.textContent = e.message; }
}

async function removeTask(id) {
  if (!confirm('Удалить задачу?')) return;
  try { await API.deleteTask(id); await render(); }
  catch (e) { alert(e.message); }
}

function parseImportInput() {
  const raw = document.getElementById('imp_data').value.trim();
  if (!raw) throw new Error('Пусто');
  if (raw[0] === '[' || raw[0] === '{') { return { json: JSON.parse(raw) }; }
  return { csv: raw };
}
async function runImport(dataset, dryRun) {
  const err = document.getElementById('modalErr');
  err.textContent = '';
  try {
    const payload = parseImportInput();
    const r = await API.importData(dataset, payload, dryRun);
    if (dryRun) {

  const data = {
    userId: document.getElementById('cl_user').value,
    fullName: document.getElementById('cl_fullname').value.trim(),
    branchId: document.getElementById('cl_branch').value || null,
    tariffId: document.getElementById('cl_tariff').value || null,
    status: document.getElementById('cl_status').value,
    responsibleManagerId: document.getElementById('cl_manager').value || null,
    parentName: document.getElementById('cl_parent_name').value.trim(),
    parentPhone: document.getElementById('cl_parent_phone').value.trim(),
    birthDate: document.getElementById('cl_birth').value || null,
    documentId: document.getElementById('cl_doc').value.trim(),
    videoConsent: document.getElementById('cl_video').checked,
    comment: document.getElementById('cl_comment').value.trim(),
  };
  // Если выбран тариф — отметим дату выдачи абонемента, чтобы сервер рассчитал остаток занятий
  if (data.tariffId) data.subscriptionIssuedAt = Date.now();
  const err = document.getElementById('modalErr');
  if (!data.userId || !data.fullName) { err.textContent = I18N.t('common.error'); return; }
  try {
    if (id) await API.updateCrmStudent(id, data); else await API.createCrmStudent(data);

async function openAttendance(sessionId, groupId) {
  const [existing, members] = await Promise.all([
    API.getSessionAttendance(sessionId),
    groupId ? API.getMembers(groupId) : Promise.resolve([]),
  ]);
  const existMap = {};
  (existing || []).forEach(r => { existMap[r.studentId] = r.status; });
  // полный список = состав группы ∪ уже отмеченные
  const roster = [];
  const seen = new Set();
  (members || []).forEach(m => { roster.push({ studentId: m.studentId, name: m.name || userName(m.studentId) }); seen.add(m.studentId); });
  (existing || []).forEach(r => { if (!seen.has(r.studentId)) { roster.push({ studentId: r.studentId, name: r.name || userName(r.studentId) }); seen.add(r.studentId); } });

  document.getElementById('modalContent').innerHTML = `
    <h2 data-i18n="session.attendance">Посещаемость</h2>
    <p style="color:#64748b;font-size:13px">Отметка «${I18N.t('session.present')}» списывает одно занятие у активного абонемента. Исправление возвращает занятие.</p>
    <div id="att_list">${roster.length ? roster.map(r=>{
      const st = existMap[r.studentId] || 'present';
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #eef2f7">
        <span>${escapeHtml(r.name)}</span>
        <select class="form-input att_sel" data-student="${r.studentId}" style="width:160px">
          <option value="present" ${st==='present'?'selected':''}>${I18N.t('session.present')}</option>
          <option value="absent" ${st==='absent'?'selected':''}>${I18N.t('session.absent')}</option>
          <option value="late" ${st==='late'?'selected':''}>${I18N.t('session.late')}</option>
        </select>
      </div>`;
    }).join('') : `<div style="color:#64748b">${I18N.t('common.none')} — в группе нет учеников</div>`}</div>
    <div id="modalErr" style="color:#ef4444;font-weight:700;min-height:18px"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:14px">
      <button class="btn btn-outline" onclick="closeModal()" data-i18n="common.close">Закрыть</button>
      <button class="btn btn-success" onclick="saveAttendance('${sessionId}')" data-i18n="session.save_attendance">Сохранить</button>
    </div>`;
  document.getElementById('modal').classList.add('active');
  I18N.applyI18n(document.getElementById('modalContent'));
}

  const records = Array.from(document.querySelectorAll('.att_sel')).map(s => ({ studentId: s.dataset.student, status: s.value }));
  try { await API.saveAttendance({ lessonSessionId: sessionId, records }); closeModal(); showToast(I18N.t('common.saved'),'success'); }

      <td>${(h.taskIds||[]).length}</td>
      <td>${fmtDate(h.dueDate)}</td>
      <td>${fmtDate(h.sessionDate)}</td>
      <td><button class="btn btn-ghost btn-sm" style="color:#ef4444" onclick="removeHw('${h.id}')">${I18N.t('common.delete')}</button></td>
    </tr>`).join('') : `<tr><td colspan="5" style="text-align:center;color:#64748b">${I18N.t('common.none')}</td></tr>`}
    </tbody></table>`;
  I18N.applyI18n(box);
}
function openHwForm(sessionId) {
  document.getElementById('modalContent').innerHTML = `
    <h2>${I18N.t('admin.homework')}</h2>
    <div class="form-group"><label>Модуль (необязательно — назначит все задачи модуля)</label><select class="form-input" id="hwf_module">
      <option value="">— не указан —</option>
      ${cache.modules.map(m=>`<option value="${m.id}">${escapeHtml(m.title)}</option>`).join('')}</select></div>
    <div class="form-group"><label>Или ID конкретных задач через запятую</label><input class="form-input" id="hwf_tasks" placeholder="напр. 12, 15, 18"></div>
    <div class="form-group"><label>Срок сдачи (необязательно)</label><input class="form-input" id="hwf_due" type="date"></div>
    <div id="modalErr" style="color:#ef4444;font-weight:700;min-height:18px"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="closeModal()" data-i18n="common.cancel">Отмена</button>
      <button class="btn btn-success" onclick="saveHw('${sessionId}')" data-i18n="common.create">Создать</button>
    </div>`;
  document.getElementById('modal').classList.add('active');
  I18N.applyI18n(document.getElementById('modalContent'));
}
async function saveHw(sessionId) {
  const taskIds = document.getElementById('hwf_tasks').value.split(',').map(s=>s.trim()).filter(Boolean);
  const moduleId = document.getElementById('hwf_module').value || null;
  const dueRaw = document.getElementById('hwf_due').value;
  const data = { lessonSessionId: sessionId, moduleId, taskIds, dueDate: dueRaw ? new Date(dueRaw).getTime() : null };
  const err = document.getElementById('modalErr');
  if (!moduleId && !taskIds.length) { err.textContent = 'Укажите модуль или задачи'; return; }
  try { await API.createHomework(data); closeModal(); await loadHw(); showToast(I18N.t('common.saved'),'success'); }
  catch (e) { err.textContent = e.message; }
}
async function removeHw(id) {
  if (!confirm(I18N.t('common.confirm_delete'))) return;
  try { await API.deleteHomework(id); await loadHw(); } catch (e) { alert(e.message); }
}

// ---------- Уведомления ----------
async function renderNotificationsTab() {
  const { items } = await API.getNotifications();
  tabEl().innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h1 data-i18n="admin.notifications">Уведомления</h1>
      <button class="btn btn-ghost btn-sm" onclick="markAllNotif();setTimeout(()=>render(),200)">${I18N.t('notif.mark_all')}</button>
    </div>
    ${items.length ? `<div class="card" style="padding:0">${items.map(n=>`
      <a href="${n.link||'#'}" onclick="markNotif('${n.id}')" class="notif-item ${n.read?'':'unread'}" style="border-bottom:1px solid #eef2f7">
        <div class="notif-text">${escapeHtml(n.text)}</div>
        <div class="notif-time">${fmtDateTime(n.createdAt)}</div>
      </a>`).join('')}</div>` : `<div class="card" style="padding:24px;text-align:center;color:#64748b">${I18N.t('notif.empty')}</div>`}`;
  I18N.applyI18n(tabEl());
}

function closeModal() { document.getElementById('modal').classList.remove('active'); }
document.getElementById('modal').onclick = e => { if (e.target.id === 'modal') closeModal(); };
</script>
</body>
</html>
